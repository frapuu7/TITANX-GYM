<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro | TitanX Fitness</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="login-body">

    <div class="login-container">
        <div class="login-card">
            <h1>TITANX</h1>
            <p>Crear Cuenta</p>

            <form id="registerForm">
                <div class="input-group-custom">
                    <i class="fa-solid fa-user"></i>
                    <input type="text" id="registerName" placeholder="Nombre completo" required>
                </div>

                <div class="input-group-custom">
                    <i class="fa-solid fa-envelope"></i>
                    <input type="email" id="registerEmail" placeholder="Correo electrónico" required>
                </div>

                <div class="input-group-custom">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="registerPassword" placeholder="Contraseña (mín. 6 caracteres)" required minlength="6">
                    <i class="fa-regular fa-eye toggle-pwd" onclick="togglePassword('registerPassword', this)"></i>
                </div>

                <div class="input-group-custom">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="registerConfirm" placeholder="Confirmar contraseña" required>
                    <i class="fa-regular fa-eye toggle-pwd" onclick="togglePassword('registerConfirm', this)"></i>
                </div>

                <div class="input-group-custom">
                    <i class="fa-solid fa-phone"></i>
                    <input type="tel" id="registerPhone" placeholder="Teléfono (opcional)">
                </div>

                <button type="submit" class="login-btn">
                    Registrarse
                </button>
            </form>

            <div id="registerMessage" class="auth-message"></div>

            <div class="login-links">
                <a href="login.html">Ya tengo cuenta</a>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
</body>

</html>
